<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Forge - Medieval Rhythm Game</title>
<meta name="description" content="Test thy reflexes in this medieval arrow-key rhythm game. Match falling arrows, build combos, and forge your way to legendary status.">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="Arrow Forge">
<meta property="og:description" content="A medieval rhythm game. Match falling arrows, build combos, and forge your way to legendary status.">
<meta property="og:image" content="https://arrow-forge.vercel.app/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://arrow-forge.vercel.app">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Arrow Forge">
<meta name="twitter:description" content="A medieval rhythm game. Match falling arrows, build combos, and forge your way to legendary status.">
<meta name="twitter:image" content="https://arrow-forge.vercel.app/og.png">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏹</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0b08;
    color: #d4c4a0;
    font-family: 'MedievalSharp', cursive;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180,120,40,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(180,120,40,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(139,109,56,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating ember particles */
  .embers {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .ember {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #c9a84c;
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }

  @keyframes float-up {
    0% { transform: translateY(100vh) scale(1); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-20px) scale(0.3); opacity: 0; }
  }

  .game-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 700px;
    padding: 16px 20px;
  }

  /* Title */
  .game-title {
    font-family: 'Cinzel', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: #c9a84c;
    text-shadow:
      0 0 30px rgba(201,168,76,0.3),
      0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 1rem;
    color: #6a5a3a;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* HUD */
  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 20px;
    background: rgba(20,16,10,0.8);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 6px;
    backdrop-filter: blur(4px);
  }

  .hud-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .hud-label {
    color: #6a5a3a;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Cinzel', serif;
    color: #c9a84c;
    font-size: 1.6rem;
    font-weight: 700;
    min-width: 60px;
    text-align: right;
  }

  /* Lives as shields */
  .lives {
    display: flex;
    gap: 5px;
  }

  .shield {
    width: 20px;
    height: 24px;
    background: linear-gradient(135deg, #dab654, #a8862e);
    clip-path: polygon(50% 0%, 100% 25%, 100% 65%, 50% 100%, 0% 65%, 0% 25%);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 8px rgba(201,168,76,0.3);
  }

  .shield.lost {
    background: #1a1510;
    transform: scale(0.6);
    box-shadow: none;
  }

  /* Arrow track */
  .track {
    position: relative;
    width: 100%;
    height: 420px;
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 10px;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(15,12,8,0.9) 100%);
    overflow: hidden;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.5),
      0 0 30px rgba(0,0,0,0.4);
  }

  /* Lane dividers */
  .lane-divider {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(201,168,76,0.08) 30%,
      rgba(201,168,76,0.12) 70%,
      rgba(201,168,76,0.06) 100%);
    pointer-events: none;
  }

  .lane-divider:nth-of-type(1) { left: 25%; }
  .lane-divider:nth-of-type(2) { left: 50%; }
  .lane-divider:nth-of-type(3) { left: 75%; }

  /* Hit zone */
  .hit-zone {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    height: 60px;
    border-top: 1px solid rgba(201,168,76,0.2);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    background: linear-gradient(90deg,
      rgba(201,168,76,0.02),
      rgba(201,168,76,0.06),
      rgba(201,168,76,0.02));
    pointer-events: none;
  }


  .hit-zone-label {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.6rem;
    color: rgba(201,168,76,0.25);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Static target arrows */
  .target-arrows {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    display: flex;
    pointer-events: none;
  }

  .target-arrow {
    width: 25%;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 48px;
  }

  .target-arrow-inner {
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    color: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.08);
    border-radius: 8px;
    background: rgba(201,168,76,0.02);
    transition: all 0.12s ease-out;
  }

  .target-arrow.flash .target-arrow-inner {
    color: rgba(201,168,76,0.9);
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.1);
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
    transform: scale(1.15);
  }

  .target-arrow.miss .target-arrow-inner {
    color: rgba(200,60,60,0.8);
    border-color: rgba(200,60,60,0.3);
    background: rgba(200,60,60,0.05);
  }

  /* Falling arrows */
  .arrow {
    position: absolute;
    width: 25%;
    display: flex;
    justify-content: center;
    pointer-events: none;
    will-change: top;
  }

  .arrow-inner {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: #e8d8b0;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 6px;
    text-shadow: 0 0 8px rgba(201,168,76,0.4);
  }

  .arrow.hit .arrow-inner {
    color: #7ddf7d;
    border-color: rgba(125,223,125,0.4);
    background: rgba(125,223,125,0.1);
    animation: hitPop 0.3s ease-out forwards;
  }

  .arrow.perfect .arrow-inner {
    color: #ffd700;
    border-color: rgba(255,215,0,0.5);
    background: rgba(255,215,0,0.15);
    animation: hitPop 0.35s ease-out forwards;
  }

  .arrow.missed .arrow-inner {
    color: #c94c4c;
    border-color: rgba(201,76,76,0.2);
    opacity: 0.4;
  }

  @keyframes hitPop {
    0% { transform: scale(1); opacity: 1; }
    30% { transform: scale(1.4); opacity: 0.9; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* Spark burst on hit */
  .spark-burst {
    position: absolute;
    pointer-events: none;
    width: 60px;
    height: 60px;
  }

  .spark {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    animation: spark-fly 0.4s ease-out forwards;
  }

  @keyframes spark-fly {
    0% { transform: translate(30px, 30px) scale(1); opacity: 1; }
    100% { opacity: 0; }
  }

  /* Feedback text */
  .feedback {
    height: 28px;
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-align: center;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.15s, transform 0.15s;
  }

  .feedback.show {
    opacity: 1;
    transform: translateY(0);
  }

  .feedback.perfect-text { color: #ffd700; text-shadow: 0 0 15px rgba(255,215,0,0.4); }
  .feedback.good-text { color: #7ddf7d; text-shadow: 0 0 15px rgba(125,223,125,0.3); }
  .feedback.miss-text { color: #c94c4c; text-shadow: 0 0 15px rgba(201,76,76,0.3); }

  /* Combo counter */
  .combo {
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .combo.show { opacity: 1; }

  .combo.fire {
    color: #ff8c00;
    text-shadow: 0 0 12px rgba(255,140,0,0.5);
    animation: combo-pulse 0.5s ease-out;
  }

  @keyframes combo-pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* Speed badge */
  .speed-badge {
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 0.7rem;
    color: #4a3a20;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Overlays */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: rgba(8,6,4,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    transition: opacity 0.6s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay .game-title {
    font-size: 3.5rem;
    animation: title-glow 3s ease-in-out infinite alternate;
  }

  @keyframes title-glow {
    0% { text-shadow: 0 0 20px rgba(201,168,76,0.2), 0 2px 4px rgba(0,0,0,0.8); }
    100% { text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15), 0 2px 4px rgba(0,0,0,0.8); }
  }

  .overlay .subtitle {
    font-size: 1.1rem;
    color: #5a4a2a;
  }

  /* Decorative divider */
  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 4px 0;
  }

  .start-btn {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 14px 48px;
    background: transparent;
    color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 4px;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .start-btn:hover::before {
    transform: translateX(100%);
  }

  .start-btn:hover {
    border-color: rgba(201,168,76,0.7);
    box-shadow: 0 0 30px rgba(201,168,76,0.1);
  }

  .controls-hint {
    color: #3a2a15;
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .key-hints {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .key-hint {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    color: #5a4a2a;
    font-size: 1rem;
  }

  /* Music toggle */
  .music-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    font-family: 'MedievalSharp', cursive;
    font-size: 0.85rem;
    padding: 6px 14px;
    background: rgba(15,12,8,0.8);
    color: #5a4a2a;
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(4px);
  }

  .music-toggle:hover {
    color: #c9a84c;
    border-color: rgba(201,168,76,0.3);
  }

  .music-toggle.active {
    color: #c9a84c;
    border-color: rgba(201,168,76,0.3);
  }

  /* Game over */
  .game-over-stats {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .final-score-label {
    font-size: 0.8rem;
    color: #4a3a20;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .game-over-stats .final-score {
    font-family: 'Cinzel', serif;
    font-size: 3.5rem;
    font-weight: 700;
    color: #c9a84c;
    text-shadow: 0 0 30px rgba(201,168,76,0.3);
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 8px;
  }

  .stat-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-cell .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #c9a84c;
  }

  .stat-cell .stat-label {
    font-size: 0.7rem;
    color: #4a3a20;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .best-combo-line {
    font-size: 0.9rem;
    color: #6a5a3a;
    margin-top: 4px;
  }

  .best-combo-line span {
    color: #c9a84c;
    font-family: 'Cinzel', serif;
    font-weight: 700;
  }

  /* Screen shake */
  .shake {
    animation: shake 0.3s ease-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px) rotate(-0.5deg); }
    75% { transform: translateX(4px) rotate(0.5deg); }
  }

  /* Level up flash */
  .level-up-flash {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(201,168,76,0.15), transparent 70%);
    pointer-events: none;
    opacity: 0;
    animation: level-flash 0.8s ease-out;
  }

  @keyframes level-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Scrolling runes at top of track */
  .rune-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg,
      transparent, rgba(201,168,76,0.3), transparent);
  }

  /* Leaderboard */
  .leaderboard {
    width: 100%;
    max-width: 320px;
    margin-top: 8px;
  }

  .lb-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: #6a5a3a;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 10px;
  }

  .lb-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .lb-entry {
    display: flex;
    align-items: center;
    padding: 6px 12px;
    background: rgba(201,168,76,0.03);
    border: 1px solid rgba(201,168,76,0.06);
    border-radius: 4px;
    transition: all 0.3s;
  }

  .lb-entry.highlight {
    background: rgba(201,168,76,0.08);
    border-color: rgba(201,168,76,0.2);
  }

  .lb-entry.new-entry {
    animation: new-score 0.5s ease-out;
  }

  @keyframes new-score {
    0% { transform: scale(1.05); background: rgba(201,168,76,0.15); }
    100% { transform: scale(1); }
  }

  .lb-rank {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #4a3a20;
    width: 28px;
    text-align: center;
  }

  .lb-entry:nth-child(1) .lb-rank { color: #ffd700; }
  .lb-entry:nth-child(2) .lb-rank { color: #c0c0c0; }
  .lb-entry:nth-child(3) .lb-rank { color: #cd7f32; }

  .lb-name {
    flex: 1;
    font-size: 0.85rem;
    color: #8a7a5a;
    padding: 0 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .lb-score {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: #c9a84c;
  }

  .lb-empty {
    text-align: center;
    font-size: 0.8rem;
    color: #3a2a15;
    padding: 8px;
  }

  /* Name input modal */
  .name-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .name-input {
    font-family: 'MedievalSharp', cursive;
    font-size: 1rem;
    padding: 8px 14px;
    background: rgba(15,12,8,0.9);
    color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    outline: none;
    width: 180px;
    text-align: center;
  }

  .name-input::placeholder { color: #3a2a15; }

  .name-input:focus {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 12px rgba(201,168,76,0.1);
  }

  .name-submit {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 8px 16px;
    background: transparent;
    color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s;
  }

  .name-submit:hover {
    border-color: rgba(201,168,76,0.6);
    background: rgba(201,168,76,0.08);
  }

  .new-high-label {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: #ffd700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,215,0,0.3);
  }
</style>
</head>
<body>

<!-- Floating embers -->
<div class="embers" id="embers"></div>

<button class="music-toggle" id="musicBtn">&#9835; Music</button>

<!-- Start Screen -->
<div class="overlay" id="startScreen">
  <h1 class="game-title">Arrow Forge</h1>
  <div class="divider"></div>
  <p class="subtitle">Test thy reflexes, smith</p>
  <button class="start-btn" id="startBtn">Begin Forging</button>
  <div class="key-hints">
    <div class="key-hint">&#9664;</div>
    <div class="key-hint">&#9650;</div>
    <div class="key-hint">&#9660;</div>
    <div class="key-hint">&#9654;</div>
  </div>
  <p class="controls-hint">Match the falling arrows with your arrow keys</p>
  <div class="leaderboard" id="startLeaderboard"></div>
</div>

<!-- Game Over Screen -->
<div class="overlay hidden" id="gameOverScreen">
  <h1 class="game-title" style="font-size:2.8rem;">Forge Grows Cold</h1>
  <div class="divider"></div>
  <div class="game-over-stats">
    <div class="final-score-label">Final Score</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="stat-grid">
      <div class="stat-cell">
        <span class="stat-val" id="finalPerfects">0</span>
        <span class="stat-label">Perfects</span>
      </div>
      <div class="stat-cell">
        <span class="stat-val" id="finalHits">0</span>
        <span class="stat-label">Hits</span>
      </div>
      <div class="stat-cell">
        <span class="stat-val" id="finalMisses">0</span>
        <span class="stat-label">Misses</span>
      </div>
    </div>
    <div class="best-combo-line">Best Combo: <span id="finalCombo">0</span></div>
  </div>
  <div id="nameInputArea"></div>
  <div class="leaderboard" id="gameOverLeaderboard"></div>
  <button class="start-btn" id="restartBtn">Forge Again</button>
</div>

<!-- Game -->
<div class="game-container" id="gameContainer">
  <h1 class="game-title" style="font-size:2rem;">Arrow Forge</h1>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Lives</span>
      <div class="lives" id="lives">
        <div class="shield"></div>
        <div class="shield"></div>
        <div class="shield"></div>
        <div class="shield"></div>
        <div class="shield"></div>
      </div>
    </div>
  </div>

  <div class="track" id="track">
    <div class="rune-bar"></div>
    <div class="lane-divider"></div>
    <div class="lane-divider"></div>
    <div class="lane-divider"></div>
    <div class="speed-badge" id="speedBadge">Apprentice</div>
    <div class="combo" id="combo">Combo x1</div>
    <div class="hit-zone">
    </div>
    <div class="target-arrows">
      <div class="target-arrow" data-dir="left"><div class="target-arrow-inner">&#9664;</div></div>
      <div class="target-arrow" data-dir="up"><div class="target-arrow-inner">&#9650;</div></div>
      <div class="target-arrow" data-dir="down"><div class="target-arrow-inner">&#9660;</div></div>
      <div class="target-arrow" data-dir="right"><div class="target-arrow-inner">&#9654;</div></div>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
</div>

<script>
// Generate ember particles
(function() {
  const container = document.getElementById('embers');
  for (let i = 0; i < 20; i++) {
    const ember = document.createElement('div');
    ember.className = 'ember';
    ember.style.left = Math.random() * 100 + '%';
    ember.style.animationDuration = (6 + Math.random() * 8) + 's';
    ember.style.animationDelay = Math.random() * 10 + 's';
    ember.style.width = (2 + Math.random() * 2) + 'px';
    ember.style.height = ember.style.width;
    ember.style.background = Math.random() > 0.5 ? '#c9a84c' : '#ff8c42';
    container.appendChild(ember);
  }
})();

// Spark burst effect
function createSparkBurst(x, y, color) {
  const track = document.getElementById('track');
  const count = 8;
  for (let i = 0; i < count; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';
    spark.style.left = x + 'px';
    spark.style.top = y + 'px';
    spark.style.background = color;
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const dist = 15 + Math.random() * 20;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    spark.style.animation = 'none';
    spark.style.transition = 'all 0.35s ease-out';
    track.appendChild(spark);
    requestAnimationFrame(() => {
      spark.style.transform = `translate(${tx}px, ${ty}px) scale(0.3)`;
      spark.style.opacity = '0';
    });
    setTimeout(() => spark.remove(), 400);
  }
}

// Medieval music using Web Audio API
class MedievalMusic {
  constructor() {
    this.ctx = null;
    this.playing = false;
    this.nodes = [];
  }

  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Master compressor for better sound
    this.compressor = this.ctx.createDynamicsCompressor();
    this.compressor.connect(this.ctx.destination);
    // Reverb-like delay
    this.delay = this.ctx.createDelay();
    this.delay.delayTime.value = 0.15;
    this.delayGain = this.ctx.createGain();
    this.delayGain.gain.value = 0.2;
    this.delay.connect(this.delayGain);
    this.delayGain.connect(this.compressor);
  }

  // Intensity level 0-4 controlled by game difficulty
  intensity = 0;

  setIntensity(level) {
    this.intensity = Math.min(level, 4);
    // Shift drone pitch and volume with intensity
    this.nodes.forEach((n, i) => {
      const baseFreqs = [65.41, 98.00, 130.81];
      const baseVols = [0.03, 0.02, 0.012];
      if (i < 3 && n.osc && n.gain) {
        // Raise drone pitch slightly and increase volume
        const pitchMult = 1 + this.intensity * 0.08;
        const volMult = 1 + this.intensity * 0.3;
        n.osc.frequency.linearRampToValueAtTime(
          baseFreqs[i] * pitchMult, this.ctx.currentTime + 0.5);
        n.gain.gain.linearRampToValueAtTime(
          Math.min(baseVols[i] * volMult, 0.08), this.ctx.currentTime + 0.5);
      }
    });
  }

  noteFreq(note) {
    // Scales get darker/more minor at higher intensity
    const scales = [
      [196.00, 220.00, 233.08, 261.63, 293.66, 329.63, 349.23, 392.00], // Dorian - calm
      [196.00, 220.00, 233.08, 261.63, 293.66, 311.13, 349.23, 392.00], // Natural minor
      [196.00, 207.65, 233.08, 261.63, 277.18, 311.13, 349.23, 392.00], // Phrygian - tense
      [196.00, 207.65, 233.08, 261.63, 277.18, 311.13, 369.99, 392.00], // Phrygian dominant
      [196.00, 207.65, 246.94, 261.63, 277.18, 329.63, 369.99, 392.00], // Hungarian minor - intense
    ];
    const scale = scales[Math.min(this.intensity, scales.length - 1)];
    return scale[note % scale.length] * (note >= 8 ? 2 : 1);
  }

  playNote(freq, time, duration, volume = 0.08) {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();

    filter.type = 'lowpass';
    // Higher intensity = brighter, more piercing
    filter.frequency.value = 1500 + this.intensity * 400;
    filter.Q.value = 2 + this.intensity * 0.5;

    // More aggressive waveform at higher intensity
    const waveforms = ['triangle', 'triangle', 'sawtooth', 'sawtooth', 'square'];
    osc.type = waveforms[Math.min(this.intensity, 4)];
    osc.frequency.value = freq;
    osc2.type = 'sine';
    osc2.frequency.value = freq * (1.003 + this.intensity * 0.002);

    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(volume, time + 0.03);
    gain.gain.setValueAtTime(volume * 0.7, time + duration * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

    osc.connect(filter);
    osc2.connect(filter);
    filter.connect(gain);
    gain.connect(this.compressor);
    gain.connect(this.delay);

    osc.start(time);
    osc.stop(time + duration);
    osc2.start(time);
    osc2.stop(time + duration);
  }

  playDrone() {
    if (!this.ctx) return;
    [[65.41, 0.03], [98.00, 0.02], [130.81, 0.012]].forEach(([freq, vol]) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 300;
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      gain.gain.value = vol;
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(this.compressor);
      osc.start();
      this.nodes.push({ osc, gain });
    });
  }

  // Add percussion at higher intensities
  playDrum(time) {
    if (!this.ctx || this.intensity < 2) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80, time);
    osc.frequency.exponentialRampToValueAtTime(40, time + 0.1);
    const vol = 0.04 + (this.intensity - 2) * 0.02;
    gain.gain.setValueAtTime(vol, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    osc.connect(gain);
    gain.connect(this.compressor);
    osc.start(time);
    osc.stop(time + 0.15);
  }

  playMelody() {
    if (!this.ctx || !this.playing) return;
    const now = this.ctx.currentTime;

    // Patterns get more complex and frantic at higher intensity
    const patternSets = [
      // Level 0: Calm, simple
      [[0,2,4,5,4,2,0,3], [5,4,2,0,2,4,7,5]],
      // Level 1: Slightly more movement
      [[0,2,4,5,4,2,0,3], [0,0,3,4,4,2,0,2], [4,5,7,5,4,2,3,0]],
      // Level 2: Faster, darker patterns + drums
      [[0,3,5,7,5,3,0,1,3,5,7,5], [7,5,3,1,0,1,3,5,7,5,3,0]],
      // Level 3: Intense, rapid runs
      [[0,1,3,5,7,5,3,1,0,3,7,5,3,1,0,1], [7,5,3,1,0,1,3,5,7,7,5,3,1,0,1,3]],
      // Level 4: Maximum chaos
      [[0,1,3,5,7,5,3,1,0,1,3,7,5,3,1,0,3,5,7,5], [7,5,3,0,1,3,5,7,5,3,1,0,3,5,7,5,3,1,0,1]],
    ];

    const set = patternSets[Math.min(this.intensity, 4)];
    const pattern = set[Math.floor(Math.random() * set.length)];
    // Tempo increases with intensity
    const beatLen = Math.max(0.4 - this.intensity * 0.05, 0.2);
    const vol = 0.05 + this.intensity * 0.008;

    pattern.forEach((note, i) => {
      const offset = (Math.random() - 0.5) * 0.02;
      this.playNote(this.noteFreq(note), now + i * beatLen + offset, beatLen * 0.7, vol);
      // Add drum hits on every 4th beat at intensity 2+
      if (i % 4 === 0) this.playDrum(now + i * beatLen);
    });

    this.melodyTimeout = setTimeout(
      () => this.playMelody(),
      pattern.length * beatLen * 1000 + 200 + Math.random() * 150
    );
  }

  start() {
    if (!this.ctx) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.playing = true;
    this.intensity = 0;
    this.playDrone();
    this.playMelody();
  }

  stop() {
    this.playing = false;
    clearTimeout(this.melodyTimeout);
    this.nodes.forEach(n => {
      n.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
      setTimeout(() => { try { n.osc.stop(); } catch(e) {} }, 600);
    });
    this.nodes = [];
  }

  hitSound() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    this.playNote(880, now, 0.08, 0.1);
    this.playNote(1100, now + 0.04, 0.06, 0.07);
  }

  perfectSound() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    this.playNote(880, now, 0.08, 0.12);
    this.playNote(1100, now + 0.06, 0.08, 0.1);
    this.playNote(1320, now + 0.12, 0.12, 0.08);
  }

  missSound() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.linearRampToValueAtTime(80, now + 0.15);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain);
    gain.connect(this.compressor || this.ctx.destination);
    osc.start(now);
    osc.stop(now + 0.2);
  }

  levelUpSound() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
      this.playNote(f, now + i * 0.1, 0.2, 0.08);
    });
  }
}

const music = new MedievalMusic();
let musicOn = false;

document.getElementById('musicBtn').addEventListener('click', () => {
  musicOn = !musicOn;
  const btn = document.getElementById('musicBtn');
  btn.textContent = musicOn ? '\u266B Music On' : '\u266B Music';
  btn.classList.toggle('active', musicOn);
  if (musicOn) {
    music.start();
  } else {
    music.stop();
  }
});

// Game state
const DIRS = ['left', 'up', 'down', 'right'];
const SYMBOLS = { left: '\u25C0', up: '\u25B2', down: '\u25BC', right: '\u25B6' };
const LANE_X = { left: 0, up: 1, down: 2, right: 3 };
const KEY_MAP = { ArrowLeft: 'left', ArrowUp: 'up', ArrowDown: 'down', ArrowRight: 'right' };

let gameActive = false;
let score = 0;
let lives = 5;
let comboCount = 0;
let bestCombo = 0;
let perfects = 0;
let hits = 0;
let misses = 0;
let arrows = [];
let spawnInterval = null;
let animFrame = null;
let baseSpeed = 2.5;
let spawnRate = 1100;
let arrowId = 0;
let difficulty = 0;

const track = document.getElementById('track');
const trackHeight = 420;
const hitZoneTop = trackHeight - 110;
const hitZoneBot = trackHeight - 50;
const hitZoneCenter = (hitZoneTop + hitZoneBot) / 2;

function showFeedback(text, cls) {
  const fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.className = 'feedback show ' + cls;
  setTimeout(() => fb.className = 'feedback', 500);
}

function flashTarget(dir, type) {
  const el = document.querySelector(`.target-arrow[data-dir="${dir}"]`);
  el.classList.add(type);
  setTimeout(() => el.classList.remove(type), 150);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  const shields = document.querySelectorAll('.shield');
  shields.forEach((s, i) => {
    s.classList.toggle('lost', i >= lives);
  });

  const comboEl = document.getElementById('combo');
  if (comboCount > 1) {
    comboEl.textContent = `Combo x${comboCount}`;
    comboEl.classList.add('show');
    comboEl.classList.toggle('fire', comboCount >= 10);
  } else {
    comboEl.classList.remove('show');
    comboEl.classList.remove('fire');
  }

  // Difficulty scaling
  const newDiff = Math.floor(score / 600);
  if (newDiff > difficulty) {
    difficulty = newDiff;
    baseSpeed = Math.min(2.5 + difficulty * 0.35, 5.5);
    spawnRate = Math.max(1100 - difficulty * 80, 450);
    restartSpawner();

    const badges = ['Apprentice', 'Journeyman', 'Blacksmith', 'Master Smith', 'Legendary'];
    document.getElementById('speedBadge').textContent = badges[Math.min(difficulty, badges.length - 1)];

    // Level up flash
    const flash = document.createElement('div');
    flash.className = 'level-up-flash';
    track.appendChild(flash);
    setTimeout(() => flash.remove(), 800);

    music.levelUpSound();
    music.setIntensity(difficulty);
  }
}

function spawnArrow() {
  if (!gameActive) return;

  const dir = DIRS[Math.floor(Math.random() * DIRS.length)];
  const el = document.createElement('div');
  el.className = 'arrow';
  const inner = document.createElement('div');
  inner.className = 'arrow-inner';
  inner.textContent = SYMBOLS[dir];
  el.appendChild(inner);
  el.style.left = (LANE_X[dir] * 25) + '%';
  el.style.top = '-45px';
  track.appendChild(el);

  arrows.push({
    id: arrowId++,
    dir,
    el,
    y: -45,
    speed: baseSpeed + (Math.random() * 0.4 - 0.2),
    hit: false,
  });
}

function restartSpawner() {
  clearInterval(spawnInterval);
  spawnInterval = setInterval(spawnArrow, spawnRate);
}

function gameLoop() {
  if (!gameActive) return;

  arrows.forEach(a => {
    if (a.hit) return;
    a.y += a.speed;
    a.el.style.top = a.y + 'px';

    if (a.y > trackHeight) {
      a.hit = true;
      a.el.classList.add('missed');
      setTimeout(() => a.el.remove(), 300);
      lives--;
      misses++;
      comboCount = 0;
      music.missSound();
      showFeedback('Miss', 'miss-text');
      flashTarget(a.dir, 'miss');
      document.getElementById('gameContainer').classList.add('shake');
      setTimeout(() => document.getElementById('gameContainer').classList.remove('shake'), 300);
      updateHUD();

      if (lives <= 0) {
        endGame();
        return;
      }
    }
  });

  arrows = arrows.filter(a => !(a.hit && a.y > trackHeight + 50));
  animFrame = requestAnimationFrame(gameLoop);
}

function handleKeyPress(dir) {
  if (!gameActive) return;

  let closest = null;
  let closestDist = Infinity;

  arrows.forEach(a => {
    if (a.hit || a.dir !== dir) return;
    const dist = Math.abs(a.y + 20 - hitZoneCenter);
    if (a.y + 20 >= hitZoneTop - 20 && a.y + 20 <= hitZoneBot + 20 && dist < closestDist) {
      closest = a;
      closestDist = dist;
    }
  });

  if (closest) {
    closest.hit = true;
    const isPerfect = closestDist < 15;

    // Calculate spark position
    const rect = closest.el.getBoundingClientRect();
    const trackRect = track.getBoundingClientRect();
    const sparkX = rect.left - trackRect.left + rect.width / 2 - 30;
    const sparkY = closest.y;

    if (isPerfect) {
      closest.el.classList.add('perfect');
      score += 150 * Math.max(1, Math.floor(comboCount / 5));
      perfects++;
      music.perfectSound();
      showFeedback('PERFECT', 'perfect-text');
      createSparkBurst(sparkX + 30, sparkY + 20, '#ffd700');
    } else {
      closest.el.classList.add('hit');
      score += 100 * Math.max(1, Math.floor(comboCount / 5));
      hits++;
      music.hitSound();
      showFeedback('Good', 'good-text');
      createSparkBurst(sparkX + 30, sparkY + 20, '#7ddf7d');
    }

    comboCount++;
    if (comboCount > bestCombo) bestCombo = comboCount;
    flashTarget(dir, 'flash');
    setTimeout(() => closest.el.remove(), 300);
    updateHUD();
  }
}

function startGame() {
  score = 0;
  lives = 5;
  comboCount = 0;
  bestCombo = 0;
  perfects = 0;
  hits = 0;
  misses = 0;
  difficulty = 0;
  baseSpeed = 2.5;
  spawnRate = 1100;
  arrows = [];
  gameActive = true;

  track.querySelectorAll('.arrow, .spark, .level-up-flash').forEach(el => el.remove());

  document.getElementById('speedBadge').textContent = 'Apprentice';
  updateHUD();

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('nameInputArea').innerHTML = '';
  renderLeaderboard('startLeaderboard', -1);

  if (!music.ctx) music.init();
  if (music.ctx.state === 'suspended') music.ctx.resume();

  restartSpawner();
  animFrame = requestAnimationFrame(gameLoop);
}

// Leaderboard (localStorage)
const LB_KEY = 'arrow_forge_leaderboard';
const LB_MAX = 5;

function getLeaderboard() {
  try {
    return JSON.parse(localStorage.getItem(LB_KEY)) || [];
  } catch { return []; }
}

function saveLeaderboard(lb) {
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
}

function isHighScore(s) {
  const lb = getLeaderboard();
  return lb.length < LB_MAX || s > (lb[lb.length - 1]?.score || 0);
}

function addToLeaderboard(name, s) {
  const lb = getLeaderboard();
  const entry = { name: name.slice(0, 16) || 'Anonymous', score: s, date: Date.now() };
  lb.push(entry);
  lb.sort((a, b) => b.score - a.score);
  if (lb.length > LB_MAX) lb.length = LB_MAX;
  saveLeaderboard(lb);
  return lb.indexOf(entry);
}

function renderLeaderboard(containerId, highlightIndex) {
  const container = document.getElementById(containerId);
  const lb = getLeaderboard();
  if (lb.length === 0) {
    container.innerHTML = `
      <div class="lb-title">Hall of Smiths</div>
      <div class="lb-empty">No scores yet. Be the first!</div>`;
    return;
  }
  const rows = lb.map((e, i) => {
    const hl = i === highlightIndex ? ' highlight new-entry' : '';
    return `<div class="lb-entry${hl}">
      <span class="lb-rank">${i + 1}</span>
      <span class="lb-name">${e.name}</span>
      <span class="lb-score">${e.score.toLocaleString()}</span>
    </div>`;
  }).join('');
  container.innerHTML = `<div class="lb-title">Hall of Smiths</div><div class="lb-list">${rows}</div>`;
}

function showNameInput(finalScore) {
  const area = document.getElementById('nameInputArea');
  const savedName = localStorage.getItem('arrow_forge_name') || '';
  area.innerHTML = `
    <div class="new-high-label">New High Score!</div>
    <div class="name-input-wrap">
      <input class="name-input" id="playerName" type="text" maxlength="16"
        placeholder="Thy name, smith" value="${savedName}" autofocus>
      <button class="name-submit" id="submitName">Inscribe</button>
    </div>`;

  const input = document.getElementById('playerName');
  const btn = document.getElementById('submitName');

  function submit() {
    const name = input.value.trim();
    localStorage.setItem('arrow_forge_name', name);
    const rank = addToLeaderboard(name || 'Anonymous', finalScore);
    area.innerHTML = '';
    renderLeaderboard('gameOverLeaderboard', rank);
  }

  btn.addEventListener('click', submit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
    e.stopPropagation();
  });

  setTimeout(() => input.focus(), 100);
}

// Show leaderboard on start screen
renderLeaderboard('startLeaderboard', -1);

function endGame() {
  gameActive = false;
  clearInterval(spawnInterval);
  cancelAnimationFrame(animFrame);

  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalPerfects').textContent = perfects;
  document.getElementById('finalHits').textContent = hits;
  document.getElementById('finalMisses').textContent = misses;
  document.getElementById('finalCombo').textContent = bestCombo;

  setTimeout(() => {
    document.getElementById('gameOverScreen').classList.remove('hidden');
    if (isHighScore(score) && score > 0) {
      showNameInput(score);
      renderLeaderboard('gameOverLeaderboard', -1);
    } else {
      document.getElementById('nameInputArea').innerHTML = '';
      renderLeaderboard('gameOverLeaderboard', -1);
    }
  }, 600);
}

document.addEventListener('keydown', (e) => {
  if (KEY_MAP[e.key]) {
    e.preventDefault();
    handleKeyPress(KEY_MAP[e.key]);
  }
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

document.addEventListener('keydown', (e) => {
  const startVisible = !document.getElementById('startScreen').classList.contains('hidden');
  const overVisible = !document.getElementById('gameOverScreen').classList.contains('hidden');
  if (!gameActive && (startVisible || overVisible)) {
    if (KEY_MAP[e.key] || e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      startGame();
    }
  }
});
